# Reusable workflow that fetches Grafana runtime errors through a Grafana MCP
# server, creates a GitHub issue, and assigns it to the Copilot coding agent.
#
# Usage in your repo:
#   jobs:
#     grafana-fix:
#       uses: Maersk-Global/grafana-error-agent/.github/workflows/reusable-grafana-fix.yml@main
#       secrets:
#         GITHUB_PAT: ${{ secrets.GIT_PAT }}
#         GRAFANA_MCP_AUTH_CLIENT_ID: ${{ secrets.GRAFANA_MCP_AUTH_CLIENT_ID }}
#         GRAFANA_MCP_AUTH_CLIENT_SECRET: ${{ secrets.GRAFANA_MCP_AUTH_CLIENT_SECRET }}
#       with:
#         service_name: my-service
#         lookback_hours: 24
#         grafana_mcp_auth_token_url: https://login.example.com/oauth2/v2.0/token
#         grafana_mcp_auth_scope: api://grafana-mcp/.default

name: Reusable Grafana Error Fix

on:
  workflow_call:
    inputs:
      grafana_mcp_server_url:
        description: 'Grafana MCP server URL. Defaults to the Maersk Grafana MCP endpoint.'
        required: false
        type: string
        default: 'https://grafana-mcp.westeurope.azure.mop.maersk.io/mcp'

      grafana_mcp_transport:
        description: 'MCP transport: auto, streamable_http, or sse.'
        required: false
        type: string
        default: 'auto'

      grafana_mcp_tool:
        description: 'Optional exact Grafana MCP tool name. If omitted, the agent discovers a logs/errors/query tool.'
        required: false
        type: string
        default: ''

      grafana_mcp_arguments:
        description: 'Optional JSON object merged into the Grafana MCP tool arguments.'
        required: false
        type: string
        default: ''

      grafana_dashboard_uid:
        description: 'Optional Grafana dashboard UID. When set, the agent derives Loki datasource/query from dashboard panels.'
        required: false
        type: string
        default: ''

      grafana_datasource_uid:
        description: 'Optional Grafana datasource UID used by Loki/Prometheus MCP tools.'
        required: false
        type: string
        default: ''

      grafana_mcp_auth_token_url:
        description: 'Optional token endpoint used to fetch a fresh Grafana MCP bearer token at runtime.'
        required: false
        type: string
        default: ''

      grafana_mcp_auth_scope:
        description: 'Optional OAuth scope sent to the Grafana MCP token endpoint.'
        required: false
        type: string
        default: ''

      grafana_mcp_auth_audience:
        description: 'Optional OAuth audience sent to the Grafana MCP token endpoint.'
        required: false
        type: string
        default: ''

      grafana_mcp_auth_extra_params:
        description: 'Optional JSON object of extra form parameters sent to the token endpoint.'
        required: false
        type: string
        default: ''

      query:
        description: 'Grafana/Loki query or search expression used when the selected tool accepts a query-like argument.'
        required: false
        type: string
        default: '(level="error" OR severity="error" OR "exception" OR "failed")'

      service_name:
        description: 'Service/application name in Grafana. Defaults to the repository name.'
        required: false
        type: string
        default: ''

      repo_label:
        description: 'Label name used by logs to identify the repository.'
        required: false
        type: string
        default: 'repository'

      lookback_hours:
        description: 'How many hours of recent Grafana data to inspect.'
        required: false
        type: number
        default: 24

      max_errors:
        description: 'Maximum Grafana errors to include in the Copilot issue.'
        required: false
        type: number
        default: 10

      include_log_patterns:
        description: 'Fetch related Loki log patterns when the MCP server supports query_loki_patterns.'
        required: false
        type: boolean
        default: true

      severity_filter:
        description: 'Minimum severity to include: critical, error, warning, info, or low.'
        required: false
        type: string
        default: 'error'

      create_issue:
        description: 'Create a GitHub issue and assign it to Copilot when Grafana errors are found.'
        required: false
        type: boolean
        default: true

      comment_on_pr:
        description: 'Comment Grafana findings on pull requests.'
        required: false
        type: boolean
        default: true

      fail_on_errors:
        description: 'Fail the workflow when Grafana errors are found.'
        required: false
        type: boolean
        default: false

    secrets:
      GITHUB_PAT:
        description: 'Caller repository PAT. Required for checking out this repo from another repo and assigning Copilot.'
        required: false
      GRAFANA_MCP_AUTH_TOKEN:
        description: 'Optional static bearer token for the Grafana MCP server. Prefer dynamic token credentials for short-lived tokens.'
        required: false
      GRAFANA_MCP_AUTH_CLIENT_ID:
        description: 'Optional client ID used with grafana_mcp_auth_token_url.'
        required: false
      GRAFANA_MCP_AUTH_CLIENT_SECRET:
        description: 'Optional client secret used with grafana_mcp_auth_token_url.'
        required: false

    outputs:
      errors_found:
        description: 'Number of Grafana errors found.'
        value: ${{ jobs.grafana.outputs.errors_found }}
      issue_url:
        description: 'URL of the created GitHub issue.'
        value: ${{ jobs.grafana.outputs.issue_url }}
      copilot_workspace_link:
        description: 'Copilot Workspace link generated by the agent.'
        value: ${{ jobs.grafana.outputs.copilot_workspace_link }}

jobs:
  grafana:
    name: Fetch Grafana Errors
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    outputs:
      errors_found: ${{ steps.grafana.outputs.errors_found }}
      issue_url: ${{ steps.create-issue.outputs.issue_url }}
      copilot_workspace_link: ${{ steps.grafana.outputs.copilot_workspace_link }}

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout Grafana Error Agent
        uses: actions/checkout@v4
        with:
          repository: Maersk-Global/grafana-error-agent
          path: scanner
          token: ${{ secrets.GITHUB_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install 'mcp>=1.9.4'

      - name: Run Grafana Error Agent
        id: grafana
        working-directory: repo
        env:
          GRAFANA_MCP_SERVER_URL: ${{ inputs.grafana_mcp_server_url }}
          GRAFANA_MCP_TRANSPORT: ${{ inputs.grafana_mcp_transport }}
          GRAFANA_MCP_TOOL: ${{ inputs.grafana_mcp_tool }}
          GRAFANA_MCP_ARGUMENTS: ${{ inputs.grafana_mcp_arguments }}
          GRAFANA_DASHBOARD_UID: ${{ inputs.grafana_dashboard_uid }}
          GRAFANA_DATASOURCE_UID: ${{ inputs.grafana_datasource_uid }}
          GRAFANA_MCP_AUTH_TOKEN: ${{ secrets.GRAFANA_MCP_AUTH_TOKEN }}
          GRAFANA_MCP_AUTH_TOKEN_URL: ${{ inputs.grafana_mcp_auth_token_url }}
          GRAFANA_MCP_AUTH_CLIENT_ID: ${{ secrets.GRAFANA_MCP_AUTH_CLIENT_ID }}
          GRAFANA_MCP_AUTH_CLIENT_SECRET: ${{ secrets.GRAFANA_MCP_AUTH_CLIENT_SECRET }}
          GRAFANA_MCP_AUTH_SCOPE: ${{ inputs.grafana_mcp_auth_scope }}
          GRAFANA_MCP_AUTH_AUDIENCE: ${{ inputs.grafana_mcp_auth_audience }}
          GRAFANA_MCP_AUTH_EXTRA_PARAMS: ${{ inputs.grafana_mcp_auth_extra_params }}
          GRAFANA_QUERY: ${{ inputs.query }}
          GRAFANA_SERVICE_NAME: ${{ inputs.service_name }}
          GRAFANA_REPO_LABEL: ${{ inputs.repo_label }}
          GRAFANA_LOOKBACK_HOURS: ${{ inputs.lookback_hours }}
          GRAFANA_MAX_ERRORS: ${{ inputs.max_errors }}
          GRAFANA_INCLUDE_LOG_PATTERNS: ${{ inputs.include_log_patterns }}
          GRAFANA_SEVERITY_FILTER: ${{ inputs.severity_filter }}
          USE_COPILOT_WORKSPACE: 'true'
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -z "$REPO_NAME" ]; then REPO_NAME="${GITHUB_REPOSITORY##*/}"; fi
          export GITHUB_REPO="$REPO_NAME"
          if [ -z "${GRAFANA_SERVICE_NAME:-}" ]; then export GRAFANA_SERVICE_NAME="$REPO_NAME"; fi

          echo "Scanning Grafana errors for $GITHUB_REPOSITORY"
          echo "Service: $GRAFANA_SERVICE_NAME"
          echo "Lookback hours: $GRAFANA_LOOKBACK_HOURS"

          python ../scanner/agent/grafana_error_agent.py --output grafana_results.json

      - name: Create GitHub Issue for Copilot
        id: create-issue
        if: inputs.create_issue && steps.grafana.outputs.errors_found != '0'
        working-directory: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT || github.token }}
          COPILOT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_PAT_SET: ${{ secrets.GITHUB_PAT != '' }}
        run: |
          TITLE=$(jq -r '.github_issue.title' grafana_results.json)
          jq -r '.github_issue.body' grafana_results.json > grafana_body.md

          echo "Creating Grafana fix issue..."
          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body-file grafana_body.md \
            --label "grafana" \
            --label "runtime-error" \
            --label "copilot") || true

          if [[ "$ISSUE_URL" != http* ]]; then
            ISSUE_URL=$(gh issue create --title "$TITLE" --body-file grafana_body.md) || true
          fi

          if [[ "$ISSUE_URL" != http* ]]; then
            echo "Failed to create Grafana issue"
            exit 0
          fi

          echo "Created Grafana issue: $ISSUE_URL"
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          REPO="${{ github.repository }}"
          BASE_BRANCH="${COPILOT_BASE_BRANCH:-main}"

          if [ "$GITHUB_PAT_SET" != "true" ]; then
            echo "GITHUB_PAT is not set. The issue was created, but Copilot assignment may fail with github.token."
          fi

          ASSIGN_RESULT=$(jq -n \
            --arg repo "$REPO" \
            --arg base "$BASE_BRANCH" \
            '{
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $repo,
                base_branch: $base,
                custom_instructions: "",
                custom_agent: "",
                model: ""
              }
            }' | gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/$REPO/issues/$ISSUE_NUMBER" \
              --input - 2>&1) || true

          if echo "$ASSIGN_RESULT" | jq -e '.assignees[]? | select(.login == "copilot-swe-agent[bot]")' > /dev/null 2>&1; then
            echo "Assigned to Copilot."
          elif echo "$ASSIGN_RESULT" | jq -e '.number' > /dev/null 2>&1; then
            echo "Issue updated. Verify Copilot assignment on the issue page."
          else
            echo "Copilot assignment failed: $(echo "$ASSIGN_RESULT" | head -c 500)"
          fi

      - name: Comment on PR
        if: inputs.comment_on_pr && github.event_name == 'pull_request' && steps.grafana.outputs.errors_found != '0'
        working-directory: repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PAT || github.token }}
        run: |
          ERRORS="${{ steps.grafana.outputs.errors_found }}"

          cat > grafana_pr_comment.md << HEREDOC
          ## Grafana Runtime Error Results

          Found **$ERRORS** recent Grafana runtime error(s) for this repository/service.

          ### Errors Found
          $(jq -r '(.errors // [])[] | "- **[\(.severity)]** \(.title) (`\(.service // "N/A")`)"' grafana_results.json)

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          HEREDOC

          gh pr comment ${{ github.event.pull_request.number }} --body-file grafana_pr_comment.md

      - name: Summary
        working-directory: repo
        run: |
          ERRORS=$(jq -r '.errors_found // 0' grafana_results.json)
          TOOL=$(jq -r '.tool // "N/A"' grafana_results.json)

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Grafana Error Agent Report

          | Metric | Value |
          |--------|-------|
          | Repository | \`${{ github.repository }}\` |
          | Service | \`${{ inputs.service_name || github.event.repository.name }}\` |
          | Tool | \`$TOOL\` |
          | Errors Found | **$ERRORS** |

          EOF

          if [ "$ERRORS" != "0" ]; then
            cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Errors

          | Severity | Title | Service |
          |----------|-------|---------|
          EOF
            jq -r '(.errors // [])[] | "| **\(.severity)** | \(.title | gsub("\\|"; " ") | .[0:100]) | `\(.service // "N/A")` |"' grafana_results.json >> $GITHUB_STEP_SUMMARY
          else
            echo "No Grafana errors found." >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "${{ steps.create-issue.outputs.issue_url }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Issue: ${{ steps.create-issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail on Grafana Errors
        if: inputs.fail_on_errors && steps.grafana.outputs.errors_found != '0'
        run: |
          echo "::error::Found ${{ steps.grafana.outputs.errors_found }} Grafana runtime error(s)"
          exit 1
